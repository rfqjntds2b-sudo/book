<!doctype html>
<html lang="{{ site.Language.Locale | default "ko" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ site.Params.description }}">
    <style>
      :root {
        color-scheme: light;
        --ink: #202124;
        --muted: #62676f;
        --line: #d8dee8;
        --paper: #fbfaf7;
        --surface: #ffffff;
        --accent: #276749;
        --accent-soft: #e5f3ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .site-header {
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .wrap {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
      }

      .site-header .wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 64px;
      }

      .brand {
        color: var(--ink);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      main {
        padding: 40px 0 64px;
      }

      .intro {
        margin-bottom: 28px;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 6vw, 48px);
        line-height: 1.1;
        letter-spacing: 0;
      }

      h2 {
        margin-top: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .muted {
        color: var(--muted);
      }

      .post-list {
        display: grid;
        gap: 14px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .post-item {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .post-item h2 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .content {
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .content ul {
        padding-left: 22px;
      }

      .site-footer {
        padding: 28px 0;
        border-top: 1px solid var(--line);
        color: var(--muted);
        background: var(--surface);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="{{ "/" | relURL }}">{{ site.Title }}</a>
        <a href="{{ "/posts/" | relURL }}">Posts</a>
      </div>
    </header>
    <main class="wrap">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <div class="wrap">Built with Hugo and Books to Scrape data.</div>
    </footer>
  </body>
</html>
