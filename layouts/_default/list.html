{{ define "main" }}
  <section class="intro">
    <h1>{{ .Title }}</h1>
  </section>

  {{ if .Pages }}
    <ul class="post-list">
      {{ range .Pages.ByDate.Reverse }}
        <li class="post-item">
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <div class="meta">{{ .Date.Format "2006-01-02 15:04" }}</div>
        </li>
      {{ end }}
    </ul>
  {{ else }}
    <p class="muted">게시된 글이 없습니다.</p>
  {{ end }}
{{ end }}
